repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: architecture-tests
        name: architecture validation
        entry: python -m pytest tests/test_architecture_v2.py -q --no-header
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-quick
        name: pytest (quick)
        entry: python -m pytest samuel/ tests/ -q --no-header -x
        language: system
        pass_filenames: false
        always_run: true
