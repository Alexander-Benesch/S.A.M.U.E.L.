name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,ci]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy samuel/ --ignore-missing-imports

      - name: Tests
        run: pytest tests/ samuel/ -v --tb=short

      - name: Architecture tests
        run: pytest tests/test_architecture_v2.py -v

      - name: Security audit
        run: pip-audit
